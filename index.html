<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Rock Paper Scissors</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 font-sans p-8">

  <main class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold text-center mb-6">Rock, Paper, Scissors</h1>

    <div id="game-result" aria-live="polite" class="sr-only"></div>

    <div class="flex justify-between mb-8 text-xl font-semibold border-b-2 pb-4">
      <p>Player: <span id="score-player">0</span></p>
      <p>Computer: <span id="score-computer">0</span></p>
    </div>

    <fieldset class="text-center">
      <legend class="sr-only">Choose your move</legend>

      <div class="flex justify-center gap-4 mt-4">
        <button type="button" id="btn-rock" class="px-6 py-3 bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500 focus:ring-offset-2 transition">
          Rock
        </button>
        <button type="button" id="btn-paper" class="px-6 py-3 bg-green-600 text-white rounded hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-green-500 focus:ring-offset-2 transition">
          Paper
        </button>
        <button type="button" id="btn-scissors" class="px-6 py-3 bg-red-600 text-white rounded hover:bg-red-700 focus:outline-none focus:ring-4 focus:ring-red-500 focus:ring-offset-2 transition">
          Scissors
        </button>
      </div>
    </fieldset>

    <div id="round-result" class="mt-6 text-center text-lg font-medium min-h-[2rem]"></div>

    <div class="text-center mt-4">
      <button type="button" id="btn-reset" class="hidden px-6 py-3 bg-gray-700 text-white rounded hover:bg-gray-800 focus:outline-none focus:ring-4 focus:ring-gray-500 focus:ring-offset-2 transition">
        Play Again
      </button>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
