<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <h1>Choose Your Weapon</h1>
    <p class="instructions">Select your choice below to play against the computer. First to 5 wins!</p>
    
    <main id="main-content">
    <button id="rock" class="choice-btn btn btn-primary" aria-label="Choose rock">Rock</button>
    <button id="paper" class="choice-btn btn btn-primary" aria-label="Choose paper">Paper</button>
    <button id="scissors" class="choice-btn btn btn-primary" aria-label="Choose scissors">Scissors</button>
    
    <div id="results" role="status" aria-live="polite" aria-atomic="true"></div>
    <button id="reset" class="btn btn-success" aria-label="Reset game" style="display: none;">Reset Game</button>
    </main>
    
    <footer class="footer" role="contentinfo">
      <p>&copy; 2026 <a href="mailto:allieclarkdev@gmail.com" title="Email Allison Clark">Allison Clark</a> | <a href="https://allie.me" target="_blank" rel="noopener noreferrer" title="Allison Clark's Portfolio">My Portfolio</a> | <a href="https://github.com/REILANA" target="_blank" rel="noopener noreferrer" title="Allison Clark GitHub Profile">GitHub</a></p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
